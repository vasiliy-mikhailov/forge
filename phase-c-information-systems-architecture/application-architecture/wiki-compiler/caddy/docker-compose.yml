services:
  caddy:
    image: caddy:2
    container_name: kurpatov-wiki-compiler-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - ACME_EMAIL=${ACME_EMAIL}
      - INFERENCE_DOMAIN=${INFERENCE_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${STORAGE_ROOT}/labs/wiki-compiler/caddy-data:/data
      - ${STORAGE_ROOT}/labs/wiki-compiler/caddy-config:/config
    networks:
      - proxy-net
    restart: unless-stopped

networks:
  proxy-net:
    external: true
