services:
  jupyter-kurpatov-wiki:
    image: forge-kurpatov-wiki:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jupyter-kurpatov-wiki
    environment:
      - NVIDIA_VISIBLE_DEVICES=${KURPATOV_WIKI_GPU_UUID}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - MLFLOW_TRACKING_URI=https://${MLFLOW_DOMAIN}
      - MLFLOW_TRACKING_USERNAME=${BASIC_AUTH_USER}
      - MLFLOW_TRACKING_PASSWORD=${MLFLOW_TRACKING_PASSWORD}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu, compute, utility]
              device_ids:
                - ${KURPATOV_WIKI_GPU_UUID}
    volumes:
      - ./notebooks:/workspace/notebooks
      - ${STORAGE_ROOT}/models:/workspace/models
      - ${STORAGE_ROOT}/kurpatov-wiki/videos:/workspace/videos
      - ${STORAGE_ROOT}/kurpatov-wiki/vault:/workspace/vault
      - ${STORAGE_ROOT}/kurpatov-wiki/checkpoints:/workspace/checkpoints
    expose:
      - "8888"
    shm_size: "8gb"
    networks:
      - proxy-net
    restart: unless-stopped

  kurpatov-transcriber:
    image: forge-kurpatov-wiki:latest
    container_name: kurpatov-transcriber
    environment:
      - NVIDIA_VISIBLE_DEVICES=${KURPATOV_WIKI_GPU_UUID}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu, compute, utility]
              device_ids:
                - ${KURPATOV_WIKI_GPU_UUID}
    volumes:
      - ./notebooks:/workspace/notebooks
      - ${STORAGE_ROOT}/models:/workspace/models
      - ${STORAGE_ROOT}/kurpatov-wiki/videos:/workspace/videos
      - ${STORAGE_ROOT}/kurpatov-wiki/vault:/workspace/vault
      - ${STORAGE_ROOT}/kurpatov-wiki/checkpoints:/workspace/checkpoints
    shm_size: "4gb"
    command: ["python", "-u", "/workspace/notebooks/03_watch_and_transcribe.py"]
    restart: unless-stopped

  # Separate from the transcriber by design: single responsibility.
  # Watches /workspace/vault/raw for new/changed files and pushes
  # them to the private kurpatov-wiki-raw GitHub repo.
  #
  # Runs a dedicated lean image (python:3.12-slim + git + openssh-client
  # + watchdog, ~200 MB) instead of the 20 GB GPU image. Rationale and
  # consequences: kurpatov-wiki/docs/adr/0006-lean-pusher-image.md.
  # Smoke test enforces: tests/smoke.md §7.
  #
  # Note: the on-disk path `/workspace/vault/raw` still uses the
  # legacy "vault" name (host: ${STORAGE_ROOT}/kurpatov-wiki/vault),
  # as does the deploy key filename `~/.ssh/kurpatov-wiki-vault`
  # which is baked into vault/.git/config core.sshCommand. Those are
  # cheap to rename later; the GitHub repo rename is the only piece
  # that needs to happen out-of-band.
  kurpatov-wiki-raw-pusher:
    image: forge-kurpatov-wiki-pusher:latest
    build:
      context: .
      dockerfile: Dockerfile.pusher
    container_name: kurpatov-wiki-raw-pusher
    volumes:
      - ./notebooks:/workspace/notebooks
      - ${STORAGE_ROOT}/kurpatov-wiki/vault:/workspace/vault
      # Deploy key (read-only) — matches vault/.git/config
      # core.sshCommand (~/.ssh/kurpatov-wiki-vault → /root/... in
      # container, /home/vmihaylov/... on host).
      - ~/.ssh/kurpatov-wiki-vault:/root/.ssh/kurpatov-wiki-vault:ro
    command: ["python", "-u", "/workspace/notebooks/04_watch_raw_and_push.py"]
    restart: unless-stopped

networks:
  proxy-net:
    external: true
