services:
  caddy:
    image: caddy:2
    container_name: rl-2048-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - ACME_EMAIL=${ACME_EMAIL}
      - BASIC_AUTH_USER=${BASIC_AUTH_USER}
      - BASIC_AUTH_HASH=${BASIC_AUTH_HASH}
      - JUPYTER_RL_2048_DOMAIN=${JUPYTER_RL_2048_DOMAIN}
      - MLFLOW_DOMAIN=${MLFLOW_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${STORAGE_ROOT}/labs/rl-2048/caddy-data:/data
      - ${STORAGE_ROOT}/labs/rl-2048/caddy-config:/config
    networks:
      - proxy-net
    restart: unless-stopped

networks:
  proxy-net:
    external: true
