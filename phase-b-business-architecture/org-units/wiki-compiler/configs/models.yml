# Compiler model registry — single source of truth for vLLM serving config.
#
# Used by:
#   phase-b-business-architecture/org-units/wiki-compiler/bin/load-active-model.sh
#     — renders .env.active-model from the entry referenced by
#       INFERENCE_ACTIVE_MODEL_ID in forge/.env.
#   phase-b-business-architecture/org-units/wiki-bench/run-battery.sh
#     — iterates over `id`s, swaps INFERENCE_ACTIVE_MODEL_ID,
#       calls make kurpatov-wiki-compiler-down/up, runs ./run.sh.
#
# See docs/adr/0008-model-registry-single-source-of-truth.md for design.
#
# Schema:
#   id:                  stable identifier; matches forge/.env: INFERENCE_ACTIVE_MODEL_ID
#   hf:                  HuggingFace model name (--model)
#   served_name:         OpenAI-compatible /v1/models id (--served-model-name)
#   quantization:        --quantization (string or null to omit; vLLM auto-detects)
#   kv_cache_dtype:      --kv-cache-dtype (fp8|int8|auto)
#   max_model_len:       --max-model-len
#   rope_scaling:        dict (rope_type, factor, original_max_position_embeddings)
#                        for context extension. Set factor: 1.0 +
#                        original_max == max_model_len for native-context models
#                        (no-op rope scaling).
#   tool_call_parser:    --tool-call-parser
#   reasoning_parser:    --reasoning-parser (or null)
#   chat_template_kwargs: dict; currently we only use enable_thinking
#   tensor_parallel_size: --tensor-parallel-size (default 1)
#   gpu_memory_utilization: --gpu-memory-utilization (default 0.92)
#
# Bench-only fields (compiler ignores them):
#   bench_tier:          A|B|C|D — for battery selection / docs
#   bench_skip:          true to skip in `run-battery.sh` no-arg run
#   notes:               free-form
#
# Adding a new model: append a new entry here. No other file edits needed.

models:
  # ============================================================
  # Tier A — dense 24-32B, single Blackwell GPU
  # ============================================================

  - id: qwen3.6-27b-fp8
    hf: Qwen/Qwen3.6-27B-FP8
    served_name: qwen3.6-27b-fp8
    quantization: fp8
    kv_cache_dtype: fp8
    max_model_len: 131072
    rope_scaling:
      rope_type: yarn
      factor: 4.0
      original_max_position_embeddings: 32768
    tool_call_parser: qwen3_xml
    reasoning_parser: qwen3
    chat_template_kwargs:
      enable_thinking: false
    tensor_parallel_size: 1
    gpu_memory_utilization: 0.92
    bench_tier: A
    bench_skip: false
    notes: |
      Verified live via A8 (2026-04-25). Current default; passes T3
      end-to-end on skill v1 with 128K context. T4 quality below
